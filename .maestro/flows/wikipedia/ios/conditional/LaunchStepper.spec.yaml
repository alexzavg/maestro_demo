appId: ${appId}
tags:
  - smokeTest
---
- launchApp:
    clearState: true

- runScript:
    file: "../../../../src/pages/ios/LaunchStepper.page.js"

- runFlow:
    when:
      visible:
        text: ${output.launchStepper.skipBtn}
    commands:
        - assertVisible:
            id: ${output.launchStepper.onboardingImg}
        - assertVisible:
            text: ${output.launchStepper.onboardingText}
        - assertVisible:
            text: ${output.launchStepper.onboardingText2}
        - assertVisible:
            text: ${output.launchStepper.learnMoreLink}
        - assertVisible:
            text: ${output.launchStepper.pageIndicator}
        - assertVisible:
            text: ${output.launchStepper.nextBtn}
